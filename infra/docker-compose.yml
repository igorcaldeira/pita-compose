# ─────────────────────────────────────────────────────────────────────────────
# Pitangui home lab — single-host Docker stack.
#
# Images are pinned by digest for reliable, reproducible 24/7 operation. The
# comment after each digest is the human-readable version it corresponds to.
# To update an image later: `docker pull <repo>:<newtag>`, then replace the
# digest here with the one from `docker image inspect <repo>:<newtag>`.
# ─────────────────────────────────────────────────────────────────────────────

# Cap container logs so they can't fill the disk over months of uptime.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  wg-easy:
    # v14 (PASSWORD_HASH-based config). Do NOT move to v15 without reworking env.
    image: ghcr.io/wg-easy/wg-easy@sha256:5f26407fd2ede54df76d63304ef184576a6c1bb73f934a58a11abdd852fab549
    container_name: wg-easy
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "WG-Easy"
      pitangui.dashboard.desc: "WireGuard VPN"
      pitangui.dashboard.url: "vpn.lab.local"
      pitangui.dashboard.port: "51821"
      pitangui.dashboard.icon: "🔒"
    restart: unless-stopped
    logging: *default-logging
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - WG_HOST=${WG_HOST:-localhost}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-10.10.0.2}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-10.10.0.0/24}
      # Interface-independent NAT + forwarding so VPN clients can reach the lab
      # network and replies can route back (Pi-hole/Caddy have no route to the
      # 10.8.0.0/24 tunnel subnet without this masquerade).
      - WG_POST_UP=iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -j MASQUERADE; iptables -A INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT;
      - WG_POST_DOWN=iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -j MASQUERADE; iptables -D INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT;
    volumes:
      - ../data/wg-easy:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "${WG_UI_PORT:-51821}:51821/tcp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:51821"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lab:
        ipv4_address: 10.10.0.10

  pihole:
    image: pihole/pihole@sha256:8ea95136e7c8c15b42d88eadf1a3875421aa1be30ad39e50f661188cc986fb27  # 2026.06.0
    container_name: pihole
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "Pi-hole"
      pitangui.dashboard.desc: "DNS & Ad Blocker"
      pitangui.dashboard.url: "pihole.lab.local/admin/"
      pitangui.dashboard.port: "8080"
      pitangui.dashboard.icon: "🛡️"
    restart: unless-stopped
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD:-admin}
      # Answer DNS from any source subnet — VPN clients arrive from 10.8.0.0/24,
      # not a directly-connected subnet, so the default "LOCAL" mode refuses them.
      FTLCONF_dns_listeningMode: "ALL"
      # Public upstream resolvers (so web browsing keeps resolving).
      FTLCONF_dns_upstreams: "8.8.8.8;8.8.4.4"
      # Local domain + load our committed /etc/dnsmasq.d wildcard for *.lab.local.
      FTLCONF_dns_domain: "lab.local"
      FTLCONF_misc_etc_dnsmasq_d: "true"
    volumes:
      - ../data/pihole/etc-pihole:/etc/pihole
      # Committed, version-controlled lab DNS (wildcard *.lab.local -> Caddy).
      - ./pihole/dnsmasq.d:/etc/dnsmasq.d
    ports:
      - "${PIHOLE_DNS:-53}:53/tcp"
      - "${PIHOLE_DNS:-53}:53/udp"
      - "${PIHOLE_UI_PORT:-8080}:80/tcp"
    networks:
      lab:
        ipv4_address: 10.10.0.2

  caddy:
    image: caddy@sha256:cfeb0b281bc44a5a51fecde39e9e577c60d863c0b6196e6bbdf58fd00960887f  # v2.11.4
    container_name: caddy
    labels:
      pitangui.dashboard.enabled: "false"
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ../data/caddy/data:/data
      - ../data/caddy/config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - dashboard
      - homeassistant
      - portainer
      - code-server
      - filebrowser
    networks:
      lab:
        ipv4_address: 10.10.0.3

  dashboard:
    image: oven/bun@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4  # 1.3.14
    container_name: dashboard
    labels:
      pitangui.dashboard.enabled: "false"
    restart: unless-stopped
    logging: *default-logging
    working_dir: /app
    command: >
      sh -c "
      bun install &&
      bun run start
      "
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ../apps/dashboard:/app
      - ./docker-compose.yml:/infra/docker-compose.yml:ro
      - ./.env:/infra/.env
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      lab:
        ipv4_address: 10.10.0.20

  homeassistant:
    build: ./docker/homeassistant
    container_name: homeassistant
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "Home Assistant"
      pitangui.dashboard.desc: "Automação Residencial"
      pitangui.dashboard.url: "ha.lab.local"
      pitangui.dashboard.port: "8123"
      pitangui.dashboard.icon: "🏠"
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    ports:
      - "8123:8123"
    volumes:
      - ../data/homeassistant:/config
      - ./docker/homeassistant/config/configuration.yaml:/config/configuration.yaml
      - /etc/localtime:/etc/localtime:ro
    networks:
      lab:
        ipv4_address: 10.10.0.21


  portainer:
    build: ./docker/portainer
    container_name: portainer
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "Portainer"
      pitangui.dashboard.desc: "Gerenciamento Docker"
      pitangui.dashboard.url: "portainer.lab.local"
      pitangui.dashboard.port: "9000"
      pitangui.dashboard.icon: "🐳"
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9000:9000"
    environment:
      PORTAINER_ADMIN_PASSWORD: ${PORTAINER_ADMIN_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../data/portainer:/data
    networks:
      lab:
        ipv4_address: 10.10.0.23

  code-server:
    image: lscr.io/linuxserver/code-server@sha256:7e9523734c003b6336781942df7b48aa6936a9df6931c12a19a1f7ad7858eeba  # 4.125.0-ls346
    container_name: code-server
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "Code Server"
      pitangui.dashboard.desc: "VS Code no Navegador"
      pitangui.dashboard.url: "code.lab.local"
      pitangui.dashboard.port: "8443"
      pitangui.dashboard.icon: "💻"
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8443:8443"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - PASSWORD=${CODESERVER_PASSWORD:-changeme}
    volumes:
      - ../data/code-server:/config
      - ../workspace:/workspace
    networks:
      lab:
        ipv4_address: 10.10.0.24

  filebrowser:
    build: ./docker/filebrowser
    container_name: filebrowser
    labels:
      pitangui.dashboard.enabled: "true"
      pitangui.dashboard.display: "FileBrowser"
      pitangui.dashboard.desc: "Gerenciador de Arquivos"
      pitangui.dashboard.url: "files.lab.local"
      pitangui.dashboard.port: "8081"
      pitangui.dashboard.icon: "📁"
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8081:80"
    environment:
      FB_USERNAME: admin
      FB_PASSWORD: ${FILEBROWSER_PASSWORD}
    volumes:
      - ../:/srv
      - ../data/filebrowser:/database
    networks:
      lab:
        ipv4_address: 10.10.0.25

  rustdesk-hbbs:
    image: rustdesk/rustdesk-server@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6  # 1.1.15
    container_name: rustdesk-hbbs
    labels:
      pitangui.dashboard.enabled: "false"
      pitangui.dashboard.display: "RustDesk"
      pitangui.dashboard.desc: "Acesso Remoto (app)"
      pitangui.dashboard.url: ""
      pitangui.dashboard.icon: "🖥️"
    restart: unless-stopped
    logging: *default-logging
    command: hbbs
    volumes:
      - ../data/rustdesk:/root
    ports:
      - "21115:21115/tcp"
      - "21116:21116/tcp"
      - "21116:21116/udp"
      - "21118:21118/tcp"
    networks:
      lab:
        ipv4_address: 10.10.0.27

  rustdesk-hbbr:
    image: rustdesk/rustdesk-server@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6  # 1.1.15
    container_name: rustdesk-hbbr
    labels:
      pitangui.dashboard.enabled: "false"
    restart: unless-stopped
    logging: *default-logging
    command: hbbr
    volumes:
      - ../data/rustdesk:/root
    ports:
      - "21117:21117/tcp"
      - "21119:21119/tcp"
    networks:
      lab:
        ipv4_address: 10.10.0.28

networks:
  lab:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
